<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SunCart – Summer Essentials</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { outfit: ["Outfit", "sans-serif"] },
            colors: {
              sun: {
                50: "#fff9ed",
                100: "#fff2d4",
                200: "#ffe1a8",
                300: "#ffcb70",
                400: "#ffab36",
                500: "#ff930f",
                600: "#f97506",
                700: "#d95907",
                800: "#b5460d",
                900: "#93390e",
              },
              ocean: {
                50: "#edfffe",
                100: "#d1fffe",
                200: "#a4fffe",
                300: "#64fcfd",
                400: "#1df0f4",
                500: "#01d4da",
                600: "#00a9b7",
                700: "#008694",
                800: "#066a78",
                900: "#0a5765",
              },
            },
          },
        },
      };
    </script>
    <style>
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes pulse-glow {
        0%,
        100% {
          box-shadow: 0 0 20px rgba(255, 147, 15, 0.3);
        }
        50% {
          box-shadow: 0 0 40px rgba(255, 147, 15, 0.6);
        }
      }
      .float-anim {
        animation: float 3s ease-in-out infinite;
      }
      .slide-in {
        animation: slideIn 0.6s ease forwards;
      }
      .shimmer-bg {
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.4),
          transparent
        );
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
      }
      .pulse-glow {
        animation: pulse-glow 2s ease-in-out infinite;
      }
      .card-hover {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .card-hover:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      }
      .nav-glass {
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .toast-anim {
        animation: slideIn 0.3s ease forwards;
      }
    </style>
    <style>
      body {
        box-sizing: border-box;
      }
    </style>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
    <script src="/_sdk/telemetry_sdk.js"></script>
  </head>
  <body class="h-full font-outfit bg-sun-50 text-gray-800 overflow-auto">


    <div id="app" class="w-full h-full flex flex-col">
      <!-- Navbar -->
      <nav
        id="navbar"
        class="sticky top-0 z-50 nav-glass bg-white/80 border-b border-sun-200/50 px-4 md:px-8 py-3"
      >
        <div class="max-w-7xl mx-auto flex items-center justify-between">
          <a
            href="#"
            onclick="navigate('home')"
            class="flex items-center gap-2"
          >
            <div
              class="w-9 h-9 bg-gradient-to-br from-sun-400 to-sun-600 rounded-xl flex items-center justify-center"
            >
              <i data-lucide="sun" class="w-5 h-5 text-white"></i>
            </div>
            <span
              id="nav-store-name"
              class="text-xl font-bold bg-gradient-to-r from-sun-600 to-ocean-600 bg-clip-text text-transparent"
              >SunCart</span
            >
          </a>
          <div class="hidden md:flex items-center gap-6">
            <a
              href="#"
              onclick="navigate('home')"
              class="text-sm font-medium hover:text-sun-600 transition"
              >Home</a
            >
           
            <a 
              href="#"
              onclick="navigate('products')"
              class="text-sm font-medium hover:text-sun-600 transition"
              >Products</a
            >
            <a
              href="#"
              onclick="navigate('profile')"
              class="text-sm font-medium hover:text-sun-600 transition"
              >My Profile</a
            >
          </div>
          <div id="auth-nav" class="flex items-center gap-3">
            <!-- Dynamic auth buttons -->
          </div>
          <button
            onclick="toggleMobileMenu()"
            class="md:hidden p-2 rounded-lg hover:bg-sun-100"
          >
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
        </div>
        <div
          id="mobile-menu"
          class="hidden md:hidden mt-3 pb-2 flex flex-col gap-2"
        >
          <a
            href="#"
            onclick="
              navigate('home');
              toggleMobileMenu();
            "
            class="px-3 py-2 rounded-lg hover:bg-sun-100 text-sm font-medium"
            >Home</a
          >
          <a
            href="#"
            onclick="
              navigate('products');
              toggleMobileMenu();
            "
            class="px-3 py-2 rounded-lg hover:bg-sun-100 text-sm font-medium"
            >Products</a
          >
          <a
            href="#"
            onclick="
              navigate('profile');
              toggleMobileMenu();
            "
            class="px-3 py-2 rounded-lg hover:bg-sun-100 text-sm font-medium"
            >My Profile</a
          >
        </div>
      </nav>

      <!-- Toast -->
      <div
        id="toast-container"
        class="fixed top-20 right-4 z-[100] flex flex-col gap-2"
      ></div>


      <!-- Main Content -->
      <main id="main-content" class="flex-1 w-full"></main>
      <!-- Footer -->
      <footer class="bg-gray-900 text-gray-300 px-4 md:px-8 py-12">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8">
          <div>
            <div class="flex items-center gap-2 mb-4">
              <div
                class="w-8 h-8 bg-gradient-to-br from-sun-400 to-sun-600 rounded-lg flex items-center justify-center"
              >
                <i data-lucide="sun" class="w-4 h-4 text-white"></i>
              </div>
              <span class="text-lg font-bold text-white">SunCart</span>
            </div>
            <p class="text-sm text-gray-400 leading-relaxed">
              Your one-stop shop for summer essentials. Quality products for the
              sunny season ahead.
            </p>
          </div>
          <div>
            <h4 class="font-semibold text-white mb-3">Contact</h4>
            <div class="space-y-2 text-sm">
              <p class="flex items-center gap-2">
                <i data-lucide="mail" class="w-4 h-4"></i>hello@suncart.store
              </p>
              <p class="flex items-center gap-2">
                <i data-lucide="phone" class="w-4 h-4"></i>+1 (555) 123-4567
              </p>
              <p class="flex items-center gap-2">
                <i data-lucide="map-pin" class="w-4 h-4"></i>Miami Beach, FL
              </p>
            </div>
          </div>
          <div>
            <h4 class="font-semibold text-white mb-3">Follow Us</h4>
            <div class="flex gap-3 mb-4">
              <a
                href="#"
                class="w-9 h-9 bg-gray-800 rounded-lg flex items-center justify-center hover:bg-sun-600 transition"
                ><i data-lucide="instagram" class="w-4 h-4"></i
              ></a>
              <a
                href="#"
                class="w-9 h-9 bg-gray-800 rounded-lg flex items-center justify-center hover:bg-sun-600 transition"
                ><i data-lucide="twitter" class="w-4 h-4"></i
              ></a>
              <a
                href="#"
                class="w-9 h-9 bg-gray-800 rounded-lg flex items-center justify-center hover:bg-sun-600 transition"
                ><i data-lucide="facebook" class="w-4 h-4"></i
              ></a>
            </div>
            <a
              href="#"
              class="text-sm text-gray-400 hover:text-sun-400 transition"
              >Privacy Policy</a
            >
          </div>
        </div>
        <div
          class="max-w-7xl mx-auto mt-8 pt-6 border-t border-gray-800 text-center text-xs text-gray-500"
        >
          © 2025 SunCart. All rights reserved.
        </div>
      </footer>
    </div>




    <script>
      // ===== STATE =====
      let currentUser = null;
      let currentPage = "home";
      let redirectAfterLogin = null;

      const products = [
        {
          id: 1,
          name: "UV Protection Sunglasses",
          brand: "SunShade",
          price: 15,
          rating: 4.7,
          stock: 10,
          description:
            "Stylish UV protection sunglasses perfect for summer outings. Lightweight frame with polarized lenses that block 99% of UV rays. Perfect for beach days and outdoor adventures.",
          image: "",
          category: "Accessories",
          emoji: "🕶️",
        },
        {
          id: 2,
          name: "Tropical Print Shirt",
          brand: "BeachWear",
          price: 29,
          rating: 4.5,
          stock: 15,
          description:
            "Breathable cotton shirt with vibrant tropical prints. Relaxed fit that keeps you cool during hot summer days. Machine washable and fade-resistant.",
          image: "",
          category: "Clothing",
          emoji: "🌴",
        },
        {
          id: 3,
          name: "SPF 50 Sunscreen",
          brand: "SkinGuard",
          price: 12,
          rating: 4.9,
          stock: 25,
          description:
            "Broad-spectrum SPF 50 sunscreen with water-resistant formula. Lightweight, non-greasy texture that absorbs quickly. Protects against UVA and UVB rays for up to 80 minutes.",
          image: "",
          category: "Skincare",
          emoji: "🧴",
        },
        {
          id: 4,
          name: "Beach Tote Bag",
          brand: "CoastalCo",
          price: 22,
          rating: 4.3,
          stock: 8,
          description:
            "Spacious beach tote with waterproof lining and multiple pockets. Sand-resistant fabric that's easy to clean. Fits towels, snacks, and all your beach essentials.",
          image: "",
          category: "Accessories",
          emoji: "👜",
        },
        {
          id: 5,
          name: "Cooling Mist Spray",
          brand: "FreshBreeze",
          price: 9,
          rating: 4.6,
          stock: 30,
          description:
            "Instant cooling facial mist with aloe vera and cucumber extract. Refreshes and hydrates skin on hot days. Travel-friendly size perfect for on-the-go relief.",
          image: "",
          category: "Skincare",
          emoji: "💨",
        },
        {
          id: 6,
          name: "Flip Flops Deluxe",
          brand: "WaveStep",
          price: 18,
          rating: 4.4,
          stock: 20,
          description:
            "Premium memory foam flip flops with arch support. Non-slip sole perfect for poolside and beach walks. Available in multiple vibrant summer colors.",
          image: "",
          category: "Footwear",
          emoji: "🩴",
        },
      ];

      // ===== NAVIGATION =====
      function navigate(page, data) {
        currentPage = page;
        window.scrollTo(0, 0);
        renderPage(data);
      }

      function renderPage(data) {
        const main = document.getElementById("main-content");
        switch (currentPage) {
          case "home":
            main.innerHTML = renderHome();
            break;
          case "products":
            main.innerHTML = renderProducts();
            break;
          case "product-detail":
            main.innerHTML = renderProductDetail(data);
            break;
          case "login":
            main.innerHTML = renderLogin();
            break;
          case "register":
            main.innerHTML = renderRegister();
            break;
          case "profile":
            main.innerHTML = renderProfile();
            break;
          case "update-profile":
            main.innerHTML = renderUpdateProfile();
            break;
        }
        updateAuthNav();
        lucide.createIcons();
      }

      // ===== AUTH NAV =====
      function updateAuthNav() {
        const nav = document.getElementById("auth-nav");
        if (currentUser) {
          nav.innerHTML = `
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-sun-400 to-ocean-500 flex items-center justify-center text-white text-xs font-bold">${currentUser.name.charAt(0).toUpperCase()}</div>
        <button onclick="logout()" class="text-sm font-medium text-gray-600 hover:text-red-500 transition hidden md:block">Logout</button>
      </div>`;
        } else {
          nav.innerHTML = `
      <div class="flex items-center gap-2">
        <button onclick="navigate('login')" class="text-sm font-medium px-3 py-1.5 rounded-lg hover:bg-sun-100 transition">Login</button>
        <button onclick="navigate('register')" class="text-sm font-medium px-3 py-1.5 bg-sun-500 text-white rounded-lg hover:bg-sun-600 transition">Register</button>
      </div>`;
        }
      }

      // ===== PAGES =====
      function renderHome() {
        const heroTitle =
          window.elementSdk?.config?.hero_title || "Summer Sale 50% OFF";
        const featured = products.slice(0, 3);
        return `
    <section class="relative overflow-hidden bg-gradient-to-br from-sun-100 via-sun-50 to-ocean-50 px-4 md:px-8 py-16 md:py-24">
      <div class="absolute top-10 right-10 text-6xl md:text-8xl opacity-20 float-anim">☀️</div>
      <div class="absolute bottom-10 left-10 text-4xl md:text-6xl opacity-15 float-anim" style="animation-delay:1s">🌊</div>
      <div class="max-w-7xl mx-auto text-center relative z-10">
        <div class="inline-block px-4 py-1.5 bg-sun-200/60 rounded-full text-sun-700 text-xs font-semibold mb-4 tracking-wide">🔥 HOT DEALS THIS SEASON</div>
        <h1 id="hero-title" class="text-4xl md:text-6xl lg:text-7xl font-extrabold leading-tight mb-4 bg-gradient-to-r from-sun-600 via-orange-500 to-ocean-600 bg-clip-text text-transparent">${heroTitle}</h1>
        <p class="text-gray-600 text-lg md:text-xl max-w-2xl mx-auto mb-8">Discover premium summer essentials at unbeatable prices. Limited time offers on sunglasses, skincare & more.</p>
        <button onclick="navigate('products')" class="px-8 py-3.5 bg-gradient-to-r from-sun-500 to-sun-600 text-white font-semibold rounded-2xl shadow-lg hover:shadow-xl hover:scale-105 transition-all pulse-glow">Shop Now <i data-lucide="arrow-right" class="w-4 h-4 inline ml-1"></i></button>
      </div>
    </section>

    <section class="px-4 md:px-8 py-16 max-w-7xl mx-auto">
      <div class="flex items-center justify-between mb-8">
        <h2 class="text-2xl md:text-3xl font-bold">Popular Products</h2>
        <a href="#" onclick="navigate('products')" class="text-sun-600 font-medium text-sm hover:underline">View All →</a>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        ${featured.map((p, i) => productCard(p, i)).join("")}
      </div>
    </section>

    <section class="px-4 md:px-8 py-16 bg-gradient-to-r from-ocean-50 to-sun-50">
      <div class="max-w-7xl mx-auto">
        <h2 class="text-2xl md:text-3xl font-bold text-center mb-10">Summer Care Tips</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          ${[
            {
              icon: "droplets",
              title: "Stay Hydrated",
              desc: "Drink at least 8 glasses of water daily. Add lemon or cucumber for a refreshing twist.",
            },
            {
              icon: "shield",
              title: "Sun Protection",
              desc: "Apply SPF 30+ sunscreen every 2 hours. Wear hats and UV-protective clothing.",
            },
            {
              icon: "heart",
              title: "Skin Care",
              desc: "Moisturize after sun exposure. Use aloe vera gel to soothe sun-kissed skin.",
            },
          ]
            .map(
              (t) => `
          <div class="bg-white/80 rounded-2xl p-6 border border-gray-100 card-hover">
            <div class="w-12 h-12 bg-ocean-100 rounded-xl flex items-center justify-center mb-4"><i data-lucide="${t.icon}" class="w-6 h-6 text-ocean-600"></i></div>
            <h3 class="font-semibold text-lg mb-2">${t.title}</h3>
            <p class="text-gray-500 text-sm leading-relaxed">${t.desc}</p>
          </div>`,
            )
            .join("")}
        </div>
      </div>
    </section>

    <section class="px-4 md:px-8 py-16 max-w-7xl mx-auto">
      <h2 class="text-2xl md:text-3xl font-bold text-center mb-10">Top Brands</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        ${["SunShade 🕶️", "BeachWear 🌴", "SkinGuard 🧴", "WaveStep 🩴"]
          .map(
            (b) => `
        <div class="bg-white rounded-2xl p-6 text-center border border-gray-100 card-hover">
          <p class="text-2xl mb-2">${b.split(" ")[1]}</p>
          <p class="font-semibold text-gray-700">${b.split(" ")[0]}</p>
        </div>`,
          )
          .join("")}
      </div>
    </section>`;
      }

      function productCard(p, i) {
        return `
  <div class="bg-white rounded-2xl overflow-hidden border border-gray-100 card-hover slide-in" style="animation-delay:${i * 0.1}s">
    <div class="h-48 bg-gradient-to-br from-sun-100 to-ocean-50 flex items-center justify-center text-6xl">${p.emoji}</div>
    <div class="p-5">
      <p class="text-xs text-sun-600 font-semibold mb-1">${p.category}</p>
      <h3 class="font-bold text-lg mb-1">${p.name}</h3>
      <div class="flex items-center gap-2 mb-3">
        <span class="text-yellow-500 text-sm">★ ${p.rating}</span>
        <span class="text-gray-400 text-xs">| ${p.brand}</span>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-xl font-bold text-sun-600">$${p.price}</span>
        <button onclick="viewProduct(${p.id})" class="px-4 py-2 bg-sun-500 text-white text-sm font-medium rounded-xl hover:bg-sun-600 transition">View Details</button>
      </div>
    </div>
  </div>`;
      }

      function renderProducts() {
        return `
  <section class="px-4 md:px-8 py-12 max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold mb-8">All Products</h1>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      ${products.map((p, i) => productCard(p, i)).join("")}
    </div>
  </section>`;
      }

      function viewProduct(id) {
        if (!currentUser) {
          redirectAfterLogin = { page: "product-detail", data: id };
          showToast("Please login to view product details", "warning");
          navigate("login");
          return;
        }
        navigate("product-detail", id);
      }

      function renderProductDetail(id) {
        const p = products.find((x) => x.id === id);
        if (!p) return '<div class="p-8 text-center">Product not found</div>';
        return `
  <section class="px-4 md:px-8 py-12 max-w-7xl mx-auto">
    <button onclick="navigate('products')" class="flex items-center gap-1 text-gray-500 hover:text-sun-600 mb-6 text-sm font-medium"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Products</button>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
      <div class="bg-gradient-to-br from-sun-100 to-ocean-50 rounded-3xl h-64 md:h-96 flex items-center justify-center text-8xl md:text-9xl">${p.emoji}</div>
      <div class="flex flex-col justify-center">
        <span class="inline-block px-3 py-1 bg-sun-100 text-sun-700 rounded-full text-xs font-semibold w-fit mb-3">${p.category}</span>
        <h1 class="text-3xl md:text-4xl font-bold mb-2">${p.name}</h1>
        <p class="text-gray-500 mb-1">by <span class="font-medium text-gray-700">${p.brand}</span></p>
        <div class="flex items-center gap-3 mb-4">
          <span class="text-yellow-500 font-medium">★ ${p.rating}</span>
          <span class="text-sm text-gray-400">${p.stock} in stock</span>
        </div>
        <p class="text-gray-600 leading-relaxed mb-6">${p.description}</p>
        <div class="flex items-center gap-4">
          <span class="text-3xl font-bold text-sun-600">$${p.price}</span>
          <button onclick="showToast('Added to cart! 🛒','success')" class="px-6 py-3 bg-gradient-to-r from-sun-500 to-sun-600 text-white font-semibold rounded-2xl hover:scale-105 transition-all shadow-lg">Add to Cart</button>
        </div>
      </div>
    </div>
  </section>`;
      }

      function renderLogin() {
        return `
  <section class="px-4 py-12 flex items-center justify-center min-h-[70%]">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
      <h2 class="text-2xl font-bold text-center mb-6">Welcome Back</h2>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="mb-4">
          <label for="login-email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input id="login-email" type="email" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:border-sun-400 focus:ring-2 focus:ring-sun-100 outline-none transition" placeholder="you@example.com">
        </div>
        <div class="mb-5">
          <label for="login-pass" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input id="login-pass" type="password" required class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:border-sun-400 focus:ring-2 focus:ring-sun-100 outline-none transition" placeholder="••••••••">
        </div>
        <div id="login-error" class="hidden text-sm text-red-500 mb-3 p-2 bg-red-50 rounded-lg"></div>
        <button type="submit" class="w-full py-3 bg-gradient-to-r from-sun-500 to-sun-600 text-white font-semibold rounded-xl hover:scale-[1.02] transition-all shadow-md">Login</button>
      </form>
      <div class="my-5 flex items-center gap-3"><div class="flex-1 h-px bg-gray-200"></div><span class="text-xs text-gray-400">OR</span><div class="flex-1 h-px bg-gray-200"></div></div>
      <button onclick="googleLogin()" class="w-full py-2.5 border border-gray-200 rounded-xl font-medium text-sm hover:bg-gray-50 transition flex items-center justify-center gap-2">

      // ===== HANDLERS =====
      function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById("login-email").value;
        const pass = document.getElementById("login-pass").value;
        const stored = JSON.parse(
          localStorage.getItem("suncart_users") || "[]",
        );
        const user = stored.find(
          (u) => u.email === email && u.password === pass,
        );
        if (user) {
          currentUser = user;
          localStorage.setItem("suncart_current", JSON.stringify(user));
          showToast("Welcome back, " + user.name + "! 🎉", "success");
          if (redirectAfterLogin) {
            navigate(redirectAfterLogin.page, redirectAfterLogin.data);
            redirectAfterLogin = null;
          } else navigate("home");
        } else {
          const err = document.getElementById("login-error");
          err.classList.remove("hidden");
          err.textContent = "Invalid email or password. Please try again.";
        }
      }

      function handleRegister(e) {
        e.preventDefault();
        const name = document.getElementById("reg-name").value;
        const email = document.getElementById("reg-email").value;
        const photo = document.getElementById("reg-photo").value;
        const pass = document.getElementById("reg-pass").value;
        const stored = JSON.parse(
          localStorage.getItem("suncart_users") || "[]",
        );
        if (stored.find((u) => u.email === email)) {
          const err = document.getElementById("register-error");
          err.classList.remove("hidden");
          err.textContent = "Email already registered. Please login instead.";
          return;
        }
        stored.push({ name, email, photo, password: pass });
        localStorage.setItem("suncart_users", JSON.stringify(stored));
        showToast("Account created! Please login. ✅", "success");
        navigate("login");
      }

      function googleLogin() {
        currentUser = {
          name: "Google User",
          email: "user@gmail.com",
          photo: "",
        };
        localStorage.setItem("suncart_current", JSON.stringify(currentUser));
        showToast("Logged in with Google! 🎉", "success");
        if (redirectAfterLogin) {
          navigate(redirectAfterLogin.page, redirectAfterLogin.data);
          redirectAfterLogin = null;
        } else navigate("home");
      }

      function handleUpdateProfile(e) {
        e.preventDefault();
        currentUser.name = document.getElementById("upd-name").value;
        currentUser.photo = document.getElementById("upd-photo").value;
        localStorage.setItem("suncart_current", JSON.stringify(currentUser));
        showToast("Profile updated! ✨", "success");
        navigate("profile");
      }

      function logout() {
        currentUser = null;
        localStorage.removeItem("suncart_current");
        showToast("Logged out successfully", "info");
        navigate("home");
      }

      function toggleMobileMenu() {
        document.getElementById("mobile-menu").classList.toggle("hidden");
      }

      // ===== TOAST =====
      function showToast(msg, type) {
        const colors = {
          success: "bg-green-500",
          warning: "bg-yellow-500",
          error: "bg-red-500",
          info: "bg-ocean-500",
        };
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `toast-anim px-4 py-3 rounded-xl text-white text-sm font-medium shadow-lg ${colors[type] || colors.info}`;
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transition = "opacity 0.3s";
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }
